name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish bundle tarball
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      - name: Resolve version from tag
        id: version
        # Tag is the full ref, e.g. refs/tags/v1.2.3 → version=1.2.3
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "${{ steps.version.outputs.value }}" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag (${{ steps.version.outputs.value }})"
            exit 1
          fi

      - name: Pack dist as solar-vX.Y.Z.tgz
        # Pack the built dist/ folder (and the d.ts) into a versioned
        # tarball that consumers (Orion v2 static-serve, Prism vendoring)
        # download via gh release.
        run: |
          mkdir -p release
          tar -czf "release/solar-${GITHUB_REF_NAME}.tgz" -C dist .
          ls -la release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/solar-*.tgz
