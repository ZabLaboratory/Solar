name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle
      # ADR 001 §6.3 gate: the served host bundle must load and mount() in
      # a real browser with NO import map. Runs against the built
      # dist/host/ (produced by `npm run build` above).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  deps-audit:
    name: Dependency audit (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        # Empty base + head=HEAD triggers filesystem mode, which works
        # identically on push (where base==head) and pull_request events.
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --results=verified,unknown

  lockfile-check:
    name: Lockfile check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify package-lock.json is in sync with package.json
        # `npm ci` strict-mode rejects any drift between package.json and
        # package-lock.json with EUSAGE, so a successful run is the proof.
        run: npm ci --ignore-scripts

  codeowners-check:
    name: CODEOWNERS present
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Check CODEOWNERS exists
        run: |
          if [ ! -f .github/CODEOWNERS ] && [ ! -f CODEOWNERS ] && [ ! -f docs/CODEOWNERS ]; then
            echo "::error::CODEOWNERS file missing"
            exit 1
          fi
          echo "CODEOWNERS found"
