name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Self-hosted runners on vps-ovh (org GitHub Actions billing frozen).
# Jobs run on the shared org-scoped ephemeral pool (label `vps-ovh`).
# Node toolchain via setup-node; Playwright installs Chromium + system deps
# on the runner (--with-deps, runner is root so apt works). No Docker needed.
# CI runs on `pull_request` ONLY (Solar has no VPS deploy; release.yml on tag).
# ---------------------------------------------------------------------------

jobs:
  check:
    name: Lint + typecheck + test + build
    runs-on: [self-hosted, vps-ovh]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:bundle
      # ADR 001 §6.3 gate: the served host bundle must load and mount() in
      # a real browser with NO import map. Runs against the built dist/host/.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  deps-audit:
    name: Dependency audit (npm audit)
    runs-on: [self-hosted, vps-ovh]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: [self-hosted, vps-ovh]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install trufflehog
        # Native binary — the docker action exits 125 on the no-Docker runner.
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" v3.90.10
          "$RUNNER_TEMP/bin/trufflehog" --version
      - name: TruffleHog scan
        run: |
          "$RUNNER_TEMP/bin/trufflehog" git file://. --fail --no-update --results=verified,unknown

  lockfile-check:
    name: Lockfile check
    runs-on: [self-hosted, vps-ovh]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify package-lock.json is in sync with package.json
        # `npm ci` strict-mode rejects any drift with EUSAGE.
        run: npm ci --ignore-scripts

  codeowners-check:
    name: CODEOWNERS present
    runs-on: [self-hosted, vps-ovh]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Check CODEOWNERS exists
        run: |
          if [ ! -f .github/CODEOWNERS ] && [ ! -f CODEOWNERS ] && [ ! -f docs/CODEOWNERS ]; then
            echo "::error::CODEOWNERS file missing"
            exit 1
          fi
          echo "CODEOWNERS found"
