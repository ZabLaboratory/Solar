<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="generator" content="@zablab/solar dev" />
    <title>Solar</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        /* Transparent so Pulsar CEF (OSR) composites the host as a true
           alpha overlay: native capture sources anchored BEHIND the
           browser_source (x-zab.capture placeholder is transparent) show
           through. A #000 here is opaque and hides them (black on-air).
           On-air the OBS canvas behind is black, so opaque scenes look
           identical; in the Prism preview the scene-server SOLAR_FIT_SHIM
           forces its own background, so preview is unaffected. */
        background: transparent;
      }
      #scene {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!--
      Host / standalone bundle entry (ADR 001 dual-build). Vite's host
      target (vite.config.host.ts) rewrites this module reference to a
      hashed, self-contained, relatively-imported JS chunk under
      dist/host/ — zero bare specifiers. The transparent 100vh #scene
      mirrors broadcast hosts' expectation (Pulsar CEF composites it as a
      transparent overlay over the operator's native video sources).
    -->
    <div id="scene" data-testid="solar-scene-root"></div>
    <script type="module" src="/src/host-entry.tsx"></script>
  </body>
</html>
